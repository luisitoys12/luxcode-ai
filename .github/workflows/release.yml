name: 🚀 Release LuxCode AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: v0.4.0)'
        required: true
        default: 'v0.4.0'
      prerelease:
        description: '¿Es pre-release / beta?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  test-gate:
    name: 🧪 Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
      - run: npm run test:coverage

  build-and-release:
    name: 📦 Build & GitHub Release
    runs-on: ubuntu-latest
    needs: test-gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run compile
      - run: npx @vscode/vsce package --no-dependencies --allow-missing-publisher

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "PRERELEASE=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            if [[ "${GITHUB_REF#refs/tags/}" == *"beta"* ]] || [[ "${GITHUB_REF#refs/tags/}" == *"alpha"* ]]; then
              echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            else
              echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create tag if manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }} 2>/dev/null || echo "Tag ya existe"
          git push origin ${{ github.event.inputs.version }} 2>/dev/null || echo "Tag ya pusheado"

      - name: Extract CHANGELOG
        id: changelog
        run: |
          VERSION_PLAIN="${{ steps.version.outputs.VERSION }}"
          VERSION_PLAIN="${VERSION_PLAIN#v}"
          NOTES=$(awk "/^## \[${VERSION_PLAIN}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | head -40)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "⚡ LuxCode AI ${{ steps.version.outputs.VERSION }}"
          prerelease: ${{ steps.version.outputs.PRERELEASE }}
          fail_on_unmatched_files: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI ${{ steps.version.outputs.VERSION }}

            ${{ steps.changelog.outputs.NOTES }}

            ---
            ### 📦 Instalación
            1. Descarga el `.vsix` de abajo ↓
            2. VS Code → Extensions → `···` → Install from VSIX

            ### 🔑 API Keys gratuitas
            | Proveedor | Link | Costo |
            |---|---|---|
            | Gemini | https://aistudio.google.com/app/apikey | ✅ Gratis |
            | Groq | https://console.groq.com | ✅ Gratis |
            | Ollama | https://ollama.com | ✅ Local |

            🌐 https://luisitoys12.github.io/luxcode-ai
