name: 🚀 Release LuxCode AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: v0.3.0)'
        required: true
        default: 'v0.3.0'
      prerelease:
        description: '¿Es pre-release / beta?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension (.vsix)
        run: vsce package --no-dependencies

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "PRERELEASE=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            if [[ "${GITHUB_REF#refs/tags/}" == *"beta"* ]] || [[ "${GITHUB_REF#refs/tags/}" == *"alpha"* ]]; then
              echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            else
              echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create tag if manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }} || echo "Tag already exists"
          git push origin ${{ github.event.inputs.version }} || echo "Tag already pushed"

      - name: Show .vsix info
        run: ls -lh *.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "⚡ LuxCode AI ${{ steps.version.outputs.VERSION }}"
          prerelease: ${{ steps.version.outputs.PRERELEASE }}
          body: |
            ## ⚡ LuxCode AI ${{ steps.version.outputs.VERSION }}

            ### 📦 Instalación rápida
            1. **Descarga** el archivo `.vsix` de abajo ↓
            2. Abre **VS Code** → Extensions `Ctrl+Shift+X`
            3. Menú `···` → **Install from VSIX**
            4. Abre el panel ⚡ en la barra lateral
            5. Pon tu API Key y ¡genera!

            ### 🔑 API Keys gratuitas
            | Proveedor | Link | Costo |
            |---|---|---|
            | Google Gemini | https://aistudio.google.com/app/apikey | ✅ Gratis |
            | Groq | https://console.groq.com | ✅ Gratis |
            | Ollama | https://ollama.com | ✅ Local |
            | OpenAI | https://platform.openai.com/api-keys | 💳 Pago |

            ### 🚀 ¿Qué puede hacer LuxCode AI?
            - 🌐 Generar páginas web completas (HTML+CSS+JS)
            - 📱 Generar apps móviles (React Native, Flutter, Ionic)
            - 🖥 Generar apps de escritorio (Tauri, Electron)
            - 🔌 Generar APIs REST (Node.js/Express)
            - 🤖 Modo Agente para tareas complejas
            - 🔌 Conectar servidores MCP
            - ✏️ Editar, explicar y corregir bugs con IA

            ### 🌐 Sitio web
            https://luisitoys12.github.io/luxcode-ai

            ### 📋 Changelog completo
            https://github.com/luisitoys12/luxcode-ai/blob/main/CHANGELOG.md
          files: "*.vsix"
          fail_on_unmatched_files: false
