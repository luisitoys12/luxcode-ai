name: 🚀 Release LuxCode AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: v0.4.0)'
        required: true
        default: 'v0.4.0'
      prerelease:
        description: '¿Es pre-release / beta?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # ── JOB 1: Tests Gate ─────────────────────────────────────────────────────
  test-gate:
    name: 🧪 Test Gate (bloquea release si fallan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: 🧪 Tests deben pasar para continuar
        run: npm test   # [FIX RL-01] Tests bloquean el release
      - run: npm run test:coverage

  # ── JOB 2: Build & Release ────────────────────────────────────────────────
  build-and-release:
    name: 📦 Build & GitHub Release
    runs-on: ubuntu-latest
    needs: test-gate   # [FIX RL-01] Solo si tests pasan
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension (.vsix)
        run: npx @vscode/vsce package --no-dependencies

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "PRERELEASE=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            if [[ "${GITHUB_REF#refs/tags/}" == *"beta"* ]] || [[ "${GITHUB_REF#refs/tags/}" == *"alpha"* ]]; then
              echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            else
              echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create tag if manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }} || echo "Tag already exists"
          git push origin ${{ github.event.inputs.version }} || echo "Tag already pushed"

      # [FIX RL-03] CHANGELOG dinámico
      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION_PLAIN="${{ steps.version.outputs.VERSION }}"
          VERSION_PLAIN="${VERSION_PLAIN#v}"
          NOTES=$(awk "/^## \[${VERSION_PLAIN}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | head -40)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Show .vsix info
        run: ls -lh *.vsix

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "⚡ LuxCode AI ${{ steps.version.outputs.VERSION }}"
          prerelease: ${{ steps.version.outputs.PRERELEASE }}
          body: |
            ## ⚡ LuxCode AI ${{ steps.version.outputs.VERSION }}

            ### 📋 Changelog
            ${{ steps.changelog.outputs.NOTES }}

            ---

            ### 📦 Instalación rápida
            1. **Descarga** el archivo `.vsix` de abajo ↓
            2. Abre **VS Code** → Extensions `Ctrl+Shift+X`
            3. Menú `···` → **Install from VSIX**
            4. Abre el panel ⚡ en la barra lateral
            5. Pon tu API Key y ¡genera!

            ### 🔑 API Keys gratuitas
            | Proveedor | Link | Costo |
            |---|---|---|
            | Google Gemini | https://aistudio.google.com/app/apikey | ✅ Gratis |
            | Groq | https://console.groq.com | ✅ Gratis |
            | Ollama | https://ollama.com | ✅ Local |
            | OpenAI | https://platform.openai.com/api-keys | 💳 Pago |

            ### 🚀 Features
            - 🌐 Web · 📱 Móvil · 🖥 Desktop · 🔌 API REST
            - 🤖 Modo Agente · 🔌 MCP Servers
            - ✏️ Editar, explicar y corregir bugs con IA
            - 🧪 17 tests · coverage ≥80% · 5 skills activos

            ### 🌐 Sitio web
            https://luisitoys12.github.io/luxcode-ai
          files: "*.vsix"
          fail_on_unmatched_files: false
