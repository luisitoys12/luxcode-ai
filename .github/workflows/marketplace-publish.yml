name: 🏪 Publicar en VS Code Marketplace

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versi\u00f3n a publicar (ej: 0.3.0)'
        required: true
        default: '0.3.0'
      bump:
        description: 'Tipo de bump de versi\u00f3n'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - patch
          - minor
          - major
  push:
    tags:
      - 'v*'

jobs:
  publish-marketplace:
    name: 🏪 VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔧 Run skills.sh (instalar dependencias)
        run: |
          chmod +x skills.sh
          # Solo las partes de instalaci\u00f3n de skills (sin compilar 2 veces)
          npm install
          npm install -g @vscode/vsce

      - name: 📃 Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 🔨 Compilar TypeScript
        run: npm run compile

      - name: 📦 Empaquetar .vsix
        run: vsce package --no-dependencies --allow-missing-publisher

      - name: 🏪 Publicar en Marketplace
        run: vsce publish --no-dependencies --allow-missing-publisher -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: 📤 Upload .vsix como artifact
        uses: actions/upload-artifact@v4
        with:
          name: luxcode-ai-marketplace-${{ env.VERSION }}
          path: '*.vsix'
          retention-days: 30

      - name: 💬 Notificar resultado
        run: |
          echo "## \ud83c\udfea Marketplace Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Versi\u00f3n | ${{ env.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publisher | luisitoys12 |" >> $GITHUB_STEP_SUMMARY
          echo "| Marketplace | [Ver extensi\u00f3n](https://marketplace.visualstudio.com/items?itemName=luisitoys12.luxcode-ai) |" >> $GITHUB_STEP_SUMMARY
          echo "| Estado | \u2705 Publicado |" >> $GITHUB_STEP_SUMMARY
