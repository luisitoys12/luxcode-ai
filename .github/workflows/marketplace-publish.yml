name: 🏪 Publicar en VS Code Marketplace

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: 0.3.0)'
        required: true
        default: '0.3.0'
  push:
    tags:
      - 'v*'

jobs:
  publish-marketplace:
    name: 🏪 VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install -g typescript @vscode/vsce
      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - run: npm run compile
      - run: vsce package --no-dependencies --allow-missing-publisher
      - name: 🏪 Publicar en Marketplace
        run: vsce publish --no-dependencies --allow-missing-publisher -p ${{ secrets.VSCE_PAT }}
      - uses: actions/upload-artifact@v4
        with:
          name: luxcode-ai-marketplace-${{ env.VERSION }}
          path: '*.vsix'
          retention-days: 30
      - name: Resumen
        run: |
          echo "## 🏪 Marketplace" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Versión | ${{ env.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Link | [marketplace.visualstudio.com](https://marketplace.visualstudio.com/items?itemName=luisitoys12.luxcode-ai) |" >> $GITHUB_STEP_SUMMARY
          echo "| Estado | ✅ Publicado |" >> $GITHUB_STEP_SUMMARY
