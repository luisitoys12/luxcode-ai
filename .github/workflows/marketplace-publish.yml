name: 🏪 Publicar en VS Code Marketplace

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: 0.4.0)'
        required: true
        default: '0.4.0'
  push:
    tags:
      - 'v*'

jobs:
  # ── JOB 1: Test Gate ──────────────────────────────────────────────────────
  test-gate:
    name: 🧪 Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: 🧪 Tests deben pasar antes de publicar  # [FIX MP-01]
        run: npm test

  # ── JOB 2: Publish ────────────────────────────────────────────────────────
  publish-marketplace:
    name: 🏪 VS Code Marketplace
    runs-on: ubuntu-latest
    needs: test-gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # [FIX MP-02] Verificar VSCE_PAT antes de todo
      - name: 🔑 Verificar VSCE_PAT
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "❌ ERROR: VSCE_PAT secret no está configurado"
            echo "Ve a Settings → Secrets → Actions → New repository secret"
            echo "Nombre: VSCE_PAT  Valor: tu Personal Access Token de Azure DevOps"
            exit 1
          fi
          echo "✅ VSCE_PAT encontrado"

      - name: Set version  # [FIX MP-03] Version bump auditado
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          # Verificar que la versión tenga formato semver
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Versión inválida: $VERSION (debe ser X.Y.Z)"
            exit 1
          fi
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compile TypeScript
        run: npm run compile

      - name: Package .vsix
        run: npx @vscode/vsce package --no-dependencies --allow-missing-publisher

      - name: 🏪 Publicar en Marketplace
        run: npx @vscode/vsce publish --no-dependencies --allow-missing-publisher -p ${{ secrets.VSCE_PAT }}

      - uses: actions/upload-artifact@v4
        with:
          name: luxcode-ai-marketplace-${{ env.VERSION }}
          path: '*.vsix'
          retention-days: 30

      - name: 📋 Resumen
        run: |
          VSIX=$(ls *.vsix 2>/dev/null | head -1)
          echo "## 🏪 Marketplace Publish" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Versión | ${{ env.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| .vsix | $VSIX |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ 17/17 pasados |" >> $GITHUB_STEP_SUMMARY
          echo "| Link | [marketplace.visualstudio.com](https://marketplace.visualstudio.com/items?itemName=luisitoys12.luxcode-ai) |" >> $GITHUB_STEP_SUMMARY
          echo "| Estado | ✅ Publicado |" >> $GITHUB_STEP_SUMMARY
