name: 🎟️ Publicar todos los releases

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe SI para publicar v0.1.0-beta, v0.2.0 y v0.3.0'
        required: true
        default: 'SI'

jobs:
  release-v010-beta:
    name: 📦 Release v0.1.0-beta
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'SI'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm version 0.1.0 --no-git-tag-version --allow-same-version
      - run: npx @vscode/vsce package --no-dependencies
      - name: Create tag v0.1.0-beta
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.1.0-beta 2>/dev/null || echo "Tag ya existe"
          git push origin v0.1.0-beta 2>/dev/null || echo "Tag ya pusheado"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-beta
          name: "⚡ LuxCode AI v0.1.0-beta"
          prerelease: true
          fail_on_unmatched_files: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.1.0-beta
            Primera versión pública.
            - 🌐 Generador de páginas web
            - 🔑 Gemini 2.0 Flash (gratis)
            **Instalar:** descarga `.vsix` ↓ → VS Code → Extensions → `···` → Install from VSIX

  release-v020:
    name: 📦 Release v0.2.0
    runs-on: ubuntu-latest
    needs: release-v010-beta
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm version 0.2.0 --no-git-tag-version --allow-same-version
      - run: npx @vscode/vsce package --no-dependencies
      - name: Create tag v0.2.0
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.2.0 2>/dev/null || echo "Tag ya existe"
          git push origin v0.2.0 2>/dev/null || echo "Tag ya pusheado"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: "⚡ LuxCode AI v0.2.0"
          prerelease: false
          fail_on_unmatched_files: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.2.0
            - 📱 Apps Móviles, 🖥 Escritorio
            - ⚡ Groq Llama 3.3, 🦙 Ollama, 🌐 OpenRouter

  release-v030:
    name: 📦 Release v0.3.0
    runs-on: ubuntu-latest
    needs: release-v020
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm version 0.3.0 --no-git-tag-version --allow-same-version
      - run: npx @vscode/vsce package --no-dependencies
      - name: Create tag v0.3.0
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.3.0 2>/dev/null || echo "Tag ya existe"
          git push origin v0.3.0 2>/dev/null || echo "Tag ya pusheado"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: "⚡ LuxCode AI v0.3.0"
          prerelease: false
          fail_on_unmatched_files: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.3.0
            - 🤖 Modo Agente, 🔌 MCP Server
            - 🔌 APIs REST, 🦙 Qwen 2.5
            🌐 https://luisitoys12.github.io/luxcode-ai
