name: 🎟️ Publicar todos los releases

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe SI para publicar v0.1.0-beta, v0.2.0 y v0.3.0'
        required: true
        default: 'SI'

jobs:
  # ── v0.1.0-beta ────────────────────────────────────────────────────────────
  release-v010-beta:
    name: 📦 Release v0.1.0-beta
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'SI'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npx tsc -p ./     # [FIX GA-04] npx tsc, no npm install -g typescript

      - name: Set version 0.1.0
        run: npm version 0.1.0 --no-git-tag-version --allow-same-version

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --allow-missing-publisher  # [FIX GA-04]

      - name: Create tag v0.1.0-beta
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.1.0-beta 2>/dev/null || echo "Tag ya existe"
          git push origin v0.1.0-beta 2>/dev/null || echo "Tag ya pusheado"

      - name: 🚀 GitHub Release v0.1.0-beta
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-beta
          name: "⚡ LuxCode AI v0.1.0-beta"
          prerelease: true
          fail_on_unmatched_files: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.1.0-beta — Primera versión
            - 🌐 Generador de páginas web (HTML+CSS+JS)
            - 🔑 Gemini 2.0 Flash (gratis) y OpenAI GPT-4o
            - 🎨 Panel lateral visual en VS Code

            **Instalar:** descarga `.vsix` ↓ → VS Code → Extensions → `···` → Install from VSIX

            **API Key gratis:** https://aistudio.google.com/app/apikey

  # ── v0.2.0 ────────────────────────────────────────────────────────────────
  release-v020:
    name: 📦 Release v0.2.0
    runs-on: ubuntu-latest
    needs: release-v010-beta
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Compile TypeScript
        run: npx tsc -p ./

      - name: Set version 0.2.0
        run: npm version 0.2.0 --no-git-tag-version --allow-same-version

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --allow-missing-publisher

      - name: Create tag v0.2.0
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.2.0 2>/dev/null || echo "Tag ya existe"
          git push origin v0.2.0 2>/dev/null || echo "Tag ya pusheado"

      - name: 🚀 GitHub Release v0.2.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: "⚡ LuxCode AI v0.2.0"
          prerelease: false
          fail_on_unmatched_files: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.2.0
            - 📱 Apps Móviles (React Native, Flutter, Ionic)
            - 🖥 Apps Escritorio (Tauri, Electron, Neutralino.js)
            - ⚡ Groq Llama 3.3 70B (gratis, ultra rápido)
            - 🦙 Ollama local (sin internet, 7 modelos)
            - 🌐 OpenRouter (100+ modelos)

            **Instalar:** descarga `.vsix` ↓ → VS Code → Extensions → `···` → Install from VSIX

  # ── v0.3.0 ────────────────────────────────────────────────────────────────
  release-v030:
    name: 📦 Release v0.3.0
    runs-on: ubuntu-latest
    needs: release-v020
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Compile TypeScript
        run: npx tsc -p ./

      - name: Set version 0.3.0
        run: npm version 0.3.0 --no-git-tag-version --allow-same-version

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --allow-missing-publisher

      - name: Create tag v0.3.0
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.3.0 2>/dev/null || echo "Tag ya existe"
          git push origin v0.3.0 2>/dev/null || echo "Tag ya pusheado"

      - name: 🚀 GitHub Release v0.3.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: "⚡ LuxCode AI v0.3.0 — Agente + MCP"
          prerelease: false
          fail_on_unmatched_files: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.3.0 — La versión más poderosa
            - 🤖 **Modo Agente** — tareas complejas multi-paso
            - 🔌 **MCP Server** — compatible con Copilot, Claude, Cline
            - 🔌 **Generador de APIs REST** Node.js/Express
            - 📄 AGENTS.md + llms.txt para contexto IA
            - 🦙 Qwen 2.5 Coder en Ollama

            **Instalar:** descarga `.vsix` ↓ → VS Code → Extensions → `···` → Install from VSIX

            **Sitio web:** https://luisitoys12.github.io/luxcode-ai

      - name: "✅ Todos los releases publicados"
        run: |
          echo "## ✅ Releases publicados" >> $GITHUB_STEP_SUMMARY
          echo "| Versión | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| v0.1.0-beta | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| v0.2.0      | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| v0.3.0      | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| [Ver releases](https://github.com/luisitoys12/luxcode-ai/releases) | 🔗 |" >> $GITHUB_STEP_SUMMARY
