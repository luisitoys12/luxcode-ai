name: 🎟️ Publicar todos los releases

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe SI para publicar v0.1.0-beta, v0.2.0 y v0.3.0'
        required: true
        default: 'SI'

jobs:
  release-v010-beta:
    name: 📦 v0.1.0-beta
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'SI'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - run: npm run compile
      - run: npm install -g @vscode/vsce
      - run: npm version 0.1.0 --no-git-tag-version --allow-same-version
      - run: vsce package --no-dependencies --allow-missing-publisher
      - name: Tag y Release v0.1.0-beta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.1.0-beta 2>/dev/null || true
          git push origin v0.1.0-beta 2>/dev/null || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-beta
          name: "⚡ LuxCode AI v0.1.0-beta"
          prerelease: true
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.1.0-beta — Primera versión
            ### Incluye
            - 🌐 Generador de páginas web (HTML+CSS+JS)
            - Soporte Gemini 2.0 Flash (gratis) y OpenAI
            - Panel lateral visual

            ### Instalar
            Descarga el `.vsix` abajo ↓ → VS Code → Extensions → `···` → **Install from VSIX**

            ### API Key gratis
            Gemini: https://aistudio.google.com/app/apikey

  release-v020:
    name: 📦 v0.2.0
    runs-on: ubuntu-latest
    needs: release-v010-beta
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - run: npm run compile
      - run: npm install -g @vscode/vsce
      - run: npm version 0.2.0 --no-git-tag-version --allow-same-version
      - run: vsce package --no-dependencies --allow-missing-publisher
      - name: Tag y Release v0.2.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.2.0 2>/dev/null || true
          git push origin v0.2.0 2>/dev/null || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: "⚡ LuxCode AI v0.2.0"
          prerelease: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.2.0
            ### Nuevo
            - 📱 Apps Móviles (React Native, Flutter, Ionic)
            - 🖥 Apps Escritorio (Tauri, Electron, Neutralino.js)
            - ⚡ Groq Llama 3.3 70B (gratis, ultra rápido)
            - 🦙 Ollama local (sin internet)
            - 🌐 OpenRouter (100+ modelos)

            ### Instalar
            Descarga el `.vsix` abajo ↓ → VS Code → Extensions → `···` → **Install from VSIX**

  release-v030:
    name: 📦 v0.3.0
    runs-on: ubuntu-latest
    needs: release-v020
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - run: npm run compile
      - run: npm install -g @vscode/vsce
      - run: npm version 0.3.0 --no-git-tag-version --allow-same-version
      - run: vsce package --no-dependencies --allow-missing-publisher
      - name: Tag y Release v0.3.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.3.0 2>/dev/null || true
          git push origin v0.3.0 2>/dev/null || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: "⚡ LuxCode AI v0.3.0 — Agente + MCP"
          prerelease: false
          files: "*.vsix"
          body: |
            ## ⚡ LuxCode AI v0.3.0 — La versión más poderosa
            ### Nuevo
            - 🤖 **Modo Agente** — tareas complejas multi-paso (como Kilo.ai, Cline)
            - 🔌 **MCP Server** — conecta herramientas externas, compatible con Copilot/Claude
            - 🔌 **Generador de APIs REST** con Node.js/Express
            - 📄 AGENTS.md + llms.txt para contexto IA
            - 🦙 Qwen 2.5 Coder en Ollama

            ### Instalar
            Descarga el `.vsix` abajo ↓ → VS Code → Extensions → `···` → **Install from VSIX**

            ### Sitio web
            https://luisitoys12.github.io/luxcode-ai
