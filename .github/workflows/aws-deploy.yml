name: ☁️ Deploy a AWS S3 + CloudFront

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '¿Qué desplegar?'
        required: true
        default: 'both'
        type: choice
        options:
          - site
          - vsix
          - both

jobs:
  deploy-aws:
    name: ☁️ AWS S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install -g typescript @vscode/vsce

      - name: ☁️ Configurar AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy sitio a S3
        if: github.event.inputs.deploy_target == 'site' || github.event.inputs.deploy_target == 'both'
        run: |
          aws s3 sync docs/ s3://${{ secrets.AWS_S3_BUCKET }}/site/ \
            --delete --cache-control "max-age=86400" --exclude ".DS_Store"
          echo "✅ Sitio subido a S3"

      - name: Compilar y subir .vsix a S3
        if: github.event.inputs.deploy_target == 'vsix' || github.event.inputs.deploy_target == 'both'
        run: |
          npm run compile
          vsce package --no-dependencies --allow-missing-publisher
          VSIX=$(ls *.vsix | head -1)
          VERSION=$(node -p "require('./package.json').version")
          aws s3 cp $VSIX s3://${{ secrets.AWS_S3_BUCKET }}/releases/luxcode-ai-$VERSION.vsix
          aws s3 cp $VSIX s3://${{ secrets.AWS_S3_BUCKET }}/releases/luxcode-ai-latest.vsix
          echo "✅ .vsix v$VERSION subido a S3"

      - name: Invalidar CloudFront
        if: env.AWS_CLOUDFRONT_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_ID }} \
            --paths "/*"
        env:
          AWS_CLOUDFRONT_ID: ${{ secrets.AWS_CLOUDFRONT_ID }}

      - name: Resumen
        run: |
          echo "## ☁️ AWS Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | Detalle |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ${{ secrets.AWS_S3_BUCKET }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ github.event.inputs.deploy_target }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Estado | ✅ OK |" >> $GITHUB_STEP_SUMMARY
