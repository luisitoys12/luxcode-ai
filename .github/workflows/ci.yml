name: ⚙️ CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: 🔨 Build TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install -g typescript @vscode/vsce
      - run: npm run compile
      - run: vsce package --no-dependencies --allow-missing-publisher
      - name: Info
        run: |
          VSIX=$(ls *.vsix 2>/dev/null | head -1)
          echo "## ⚙️ CI Build" >> $GITHUB_STEP_SUMMARY
          echo "| Node | .vsix | Tamaño |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 20 | $VSIX | $(du -h $VSIX | cut -f1) |" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        with:
          name: luxcode-ai-ci-${{ github.sha }}
          path: '*.vsix'
          retention-days: 3
