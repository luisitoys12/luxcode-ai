name: ⚙️ CI — Build, Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1: Tests ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install   # usa install en lugar de ci para regenerar lock si está desincronizado

      - name: 🧪 Run tests
        run: npm test

      - name: 📊 Coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── JOB 2: Build ────────────────────────────────────────────────────────────
  build:
    name: 📦 Build & Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: 🔨 Compile TypeScript
        run: npm run compile

      - name: 📦 Package VSIX
        run: npx @vscode/vsce package --no-dependencies --allow-missing-publisher

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'
          retention-days: 5

  # ── JOB 3: Security Audit ────────────────────────────────────────────────────
  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: npm audit
        run: npm audit --audit-level=moderate || true
