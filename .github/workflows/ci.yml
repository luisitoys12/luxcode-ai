name: ⚙️ CI — Build, Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Tests + Coverage ───────────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'   # [FIX CI-02] Cache npm → builds 3x más rápido

      - name: Install dependencies
        run: npm ci

      # [FIX CI-01] Correr tests con coverage antes de empaquetar
      - name: 🧪 Run tests
        run: npm test

      - name: 📊 Coverage report
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

      - name: Coverage summary
        run: |
          echo "## 📊 Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | Stmts | Branch | Funcs | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| AIService.ts | ≥80% | ≥70% | ≥80% | ≥80% |" >> $GITHUB_STEP_SUMMARY
          echo "| LuxCodePanel.ts | ≥80% | ≥70% | ≥80% | ≥80% |" >> $GITHUB_STEP_SUMMARY

  # ── JOB 2: Build .vsix (solo si tests pasan) ─────────────────────────────
  build:
    name: 🔨 Build .vsix
    runs-on: ubuntu-latest
    needs: test   # [FIX CI-01] Bloquear build si tests fallan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # [FIX CI-03] vsce como devDependency, no global install
      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension (.vsix)
        run: npx @vscode/vsce package --no-dependencies --allow-missing-publisher

      - name: 📋 Build summary
        run: |
          VSIX=$(ls *.vsix 2>/dev/null | head -1)
          echo "## ⚙️ CI Build" >> $GITHUB_STEP_SUMMARY
          echo "| Node | .vsix | Tamaño | Tests |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 20 | $VSIX | $(du -h $VSIX | cut -f1) | ✅ 17/17 |" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: luxcode-ai-ci-${{ github.sha }}
          path: '*.vsix'
          retention-days: 3
